<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Employees - e-Hotels</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="app-sidebar">
        <div class="sidebar-brand"><h2>e-Hotels</h2></div>
        <nav class="sidebar-nav">
          <a href="index.html" class="nav-link">Dashboard</a>
          <a href="rooms.html" class="nav-link">Search Rooms</a>
          <a href="renting.html" class="nav-link">Rentings & Payments</a>
          <a href="customers.html" class="nav-link">Customers</a>
          <a href="employees.html" class="nav-link active">Employees</a>
          <a href="hotels.html" class="nav-link">Hotels</a>
          <a href="rooms-management.html" class="nav-link">Rooms Management</a>
          <a href="views.html" class="nav-link">SQL Views</a>
        </nav>
      </aside>
      <main class="app-main">
        <div class="main-content">
          <header class="page-header">
            <h1>Employee Management</h1>
            <p>Register and oversee hotel staff members</p>
          </header>
          <div class="grid-layout">
            <div class="panel">
              <div class="panel-header"><h2>Add Employee</h2></div>
              <div class="panel-body">
                <form id="addEmployeeForm">
                  <div class="form-group">
                    <label>Full Name</label
                    ><input type="text" id="employeeName" required />
                  </div>
                  <div class="form-group">
                    <label>Address</label
                    ><input type="text" id="employeeAddress" required />
                  </div>
                  <div class="form-group">
                    <label>SSN/SIN</label
                    ><input type="text" id="employeeSSN" required />
                  </div>
                  <div class="form-group">
                    <label>Hotel ID</label
                    ><input type="number" id="employeeHotelId" required />
                  </div>
                  <button type="submit" class="btn btn-primary btn-block mt-4">
                    Add Employee
                  </button>
                </form>
              </div>
            </div>
            <div class="panel">
              <div class="panel-header flex-between">
                <h2>Employees List</h2>
                <button id="loadEmployeesBtn" class="btn btn-secondary">
                  See All
                </button>
              </div>
              <div class="panel-body table-container" id="employeeTable">
                <div class="empty-state">
                  Click "See All" to load employees.
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
