<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hotels - e-Hotels</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="app-sidebar">
        <div class="sidebar-brand"><h2>e-Hotels</h2></div>
        <nav class="sidebar-nav">
          <a href="index.html" class="nav-link">Dashboard</a>
          <a href="rooms.html" class="nav-link">Search Rooms</a>
          <a href="renting.html" class="nav-link">Rentings & Payments</a>
          <a href="customers.html" class="nav-link">Customers</a>
          <a href="employees.html" class="nav-link">Employees</a>
          <a href="hotels.html" class="nav-link active">Hotels</a>
          <a href="rooms-management.html" class="nav-link">Rooms Management</a>
          <a href="views.html" class="nav-link">SQL Views</a>
        </nav>
      </aside>
      <main class="app-main">
        <div class="main-content">
          <header class="page-header">
            <h1>Hotel Management</h1>
            <p>Register and manage properties in the chain</p>
          </header>
          <div class="grid-layout">
            <div class="panel">
              <div class="panel-header"><h2>Add Hotel</h2></div>
              <div class="panel-body">
                <form id="addHotelForm">
                  <div class="form-group">
                    <label>Hotel Address</label
                    ><input type="text" id="hotelAddress" required />
                  </div>
                  <div class="form-grid">
                    <div class="form-group">
                      <label>Category Stars</label
                      ><input
                        type="number"
                        id="hotelCategoryStars"
                        min="1"
                        max="5"
                        required
                      />
                    </div>
                    <div class="form-group">
                      <label>Number of Rooms</label
                      ><input type="number" id="hotelNumberOfRooms" required />
                    </div>
                  </div>
                  <div class="form-group">
                    <label>Chain ID</label
                    ><input type="number" id="hotelChainId" required />
                  </div>
                  <div class="form-group">
                    <label>Manager Employee ID</label
                    ><input type="number" id="hotelManagerEmployeeId" />
                  </div>
                  <button type="submit" class="btn btn-primary btn-block mt-4">
                    Add Hotel
                  </button>
                </form>
              </div>
            </div>
            <div class="panel">
              <div class="panel-header flex-between">
                <h2>Hotels List</h2>
                <button id="loadHotelsBtn" class="btn btn-secondary">
                  See All
                </button>
              </div>
              <div class="panel-body table-container" id="hotelTable">
                <div class="empty-state">Click "See All" to load hotels.</div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
